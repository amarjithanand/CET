<!DOCTYPE html>
<html>
<head>
  <title>Gemini JSON Example</title>
</head>
<body>

  <h2>Gemini JSON Extractor</h2>
  <button onclick="sendToGemini()">Send Request</button>

  <pre id="output"></pre>

  <script>
    const API_KEY = "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"; // ⚠️ Do NOT expose in production  AIzaSyBUZgOUuj7a88pQZeGPRrGK-ygOXPsKTlO

    async function sendToGemini() {
      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${API_KEY}`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              contents: [
                {
                  role: "user",
                  parts: [
                    { text: "Extract name and age from: John is 25 years old" }
                  ]
                }
              ],
              generationConfig: {
                response_mime_type: "application/json",
                response_schema: {
                  type: "object",
                  properties: {
                    name: { type: "string" },
                    age: { type: "number" }
                  },
                  required: ["name", "age"]
                }
              }
            })
          }
        );

        const data = await response.json();
        console.log("FULL RESPONSE:", data);

        const jsonText = data.candidates[0].content.parts[0].text;
        const parsed = JSON.parse(jsonText);

        console.log(parsed);
        document.getElementById("output").textContent = 
          JSON.stringify(parsed, null, 2);

      } catch (error) {
        console.error("Error:", error);
        document.getElementById("output").textContent = 
          "Error: " + error.message;
      }
    }
  </script>

</body>
</html>
